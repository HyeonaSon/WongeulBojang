<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원글보장</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 로그인 -->
  <div id="screen-auth">
    <div id="auth-wrap">
      <div id="auth-logo">원글보장</div>
      <p id="auth-tagline">글을 적금처럼 모으세요</p>
      <input id="auth-email"    type="email"    placeholder="이메일" />
      <input id="auth-password" type="password" placeholder="비밀번호" />
      <button id="btn-login"  onclick="handleLogin()">로그인</button>
      <button id="btn-signup" onclick="handleSignup()">회원가입</button>
      <div id="auth-message"></div>
    </div>
  </div>

  <!-- 앱 -->
  <div id="app" hidden>
    <nav id="nav">
      <button data-screen="dashboard">홈</button>
      <button data-screen="editor">쓰기</button>
      <button data-screen="archive">기록</button>
      <button data-screen="stats">통계</button>
    </nav>

    <main>
      <section id="screen-dashboard"></section>
      <section id="screen-editor"   hidden></section>
      <section id="screen-archive"  hidden></section>
      <section id="screen-stats"    hidden></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/project.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
