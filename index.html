<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyWriting</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="screen-auth">
    <div id="auth-wrap">
      <div id="auth-logo">DailyWriting</div>
      <input id="auth-email" type="email" placeholder="이메일" />
      <input id="auth-password" type="password" placeholder="비밀번호" />
      <button id="btn-login" onclick="handleLogin()">로그인</button>
      <button id="btn-signup" onclick="handleSignup()">회원가입</button>
      <div id="auth-message"></div>
    </div>
  </div>

  <!-- 메인 앱 -->
  <div id="app" hidden>
    <nav id="nav">
      <button data-screen="editor">쓰기</button>
      <button data-screen="posts">아카이브</button>
      <button data-screen="goal">프로젝트</button>
      <button onclick="handleLogout()" id="btn-logout">로그아웃</button>
    </nav>

    <main>
      <section id="screen-editor"></section>
      <section id="screen-posts" hidden>
        <div id="posts-list"></div>
      </section>
      <section id="screen-goal" hidden></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/posts.js"></script>
  <script src="js/goal.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
