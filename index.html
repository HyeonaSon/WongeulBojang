<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>원글보장</title>

  <!-- 프리텐다드 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/static/pretendard.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="css/reset.css?v=4">
  <link rel="stylesheet" href="css/typography.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="app">
    <nav id="nav">
      <button data-screen="dashboard">
        <span class="nav-icon">🏦</span>
        홈
      </button>
      <button data-screen="editor">
        <span class="nav-icon">✍️</span>
        납입
      </button>
      <button data-screen="archive">
        <span class="nav-icon">📅</span>
        기록
      </button>
      <button data-screen="stats">
        <span class="nav-icon">📊</span>
        통계
      </button>
      <button data-screen="settings">
        <span class="nav-icon">⚙️</span>
        설정
      </button>
    </nav>

    <main>
      <section id="screen-dashboard"></section>
      <section id="screen-editor"   hidden></section>
      <section id="screen-archive"  hidden></section>
      <section id="screen-stats"    hidden></section>
      <section id="screen-settings" hidden></section>
    </main>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/backup.js"></script>
  <script src="js/project.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/archive.js"></script>
  <script src="js/stats.js"></script>
  <script src="js/dashboard.js?v=4"></script>
  <script src="js/settings.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
